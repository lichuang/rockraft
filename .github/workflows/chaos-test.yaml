name: Chaos Test

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  chaos-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: rockraft-chaos
          config: .github/kind-config.yaml

      - name: Build & load rockraft image
        run: |
          docker build -t rockraft:latest -f example/Dockerfile .
          kind load docker-image rockraft:latest --name rockraft-chaos

      - name: Install Chaos Mesh
        run: |
          helm repo add chaos-mesh https://charts.chaos-mesh.org
          helm install chaos-mesh chaos-mesh/chaos-mesh \
            --namespace chaos-mesh \
            --create-namespace \
            --set chaosDaemon.runtime=containerd \
            --set chaosDaemon.socketPath=/run/containerd/containerd.sock \
            --set dashboard.create=false \
            --set dnsServer.create=false \
            --wait \
            --timeout 3m

      - name: Deploy rockraft cluster
        run: kubectl apply -k example/k8s/

      - name: Wait for rockraft pods ready
        run: |
          kubectl wait --for=condition=ready pod -l app=rockraft \
            -n rockraft --timeout=120s
          sleep 10

      - name: Setup port forwarding
        run: |
          kubectl port-forward -n rockraft rockraft-0 8001:8000 &
          kubectl port-forward -n rockraft rockraft-1 8002:8000 &
          kubectl port-forward -n rockraft rockraft-2 8003:8000 &
          sleep 5

      - name: Verify cluster is healthy
        run: |
          for port in 8001 8002 8003; do
            echo "Checking localhost:${port}..."
            curl -sf "http://localhost:${port}/health" | python3 -m json.tool
          done

      - name: Install test dependencies
        run: pip install pyyaml pytest

      - name: Run chaos tests
        run: |
          cd example
          python3 -m pytest test/test_chaos.py -v --tb=short

      - name: Collect diagnostics on failure
        if: failure()
        run: |
          echo "=== Pod status ==="
          kubectl get pods -n rockraft -o wide
          echo ""
          echo "=== Recent events ==="
          kubectl get events -n rockraft --sort-by='.lastTimestamp'
          echo ""
          echo "=== Pod logs ==="
          kubectl logs -n rockraft -l app=rockraft --all-containers --tail=50
          echo ""
          echo "=== Chaos resources ==="
          kubectl get podchaos,networkchaos -n rockraft

      - name: Cleanup
        if: always()
        run: kind delete cluster --name rockraft-chaos
