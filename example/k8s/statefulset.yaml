apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rockraft
  namespace: rockraft
  labels:
    app: rockraft
spec:
  serviceName: rockraft-headless
  replicas: 3
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      app: rockraft
  template:
    metadata:
      labels:
        app: rockraft
    spec:
      terminationGracePeriodSeconds: 10
      containers:
      - name: rockraft
        image: rockraft:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 7000
          name: raft
        - containerPort: 8000
          name: http
        env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 3
          timeoutSeconds: 5
          failureThreshold: 10
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 10
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: "1"
            memory: 256Mi
        volumeMounts:
        - name: data
          mountPath: /data
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 1Gi
